<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ถ่ายรูป</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: sans-serif; background:#1a1a2e; color:white; text-align:center; padding:20px; }
    h3 { margin-bottom:15px; font-size:18px; }
    video { width:100%; max-width:380px; border-radius:12px; background:#000;
            box-shadow:0 4px 20px rgba(0,0,0,0.6); transform:scaleX(-1); display:block; margin:0 auto; }
    canvas { display:none; }
    .btn { border:none; padding:13px 28px; font-size:15px; font-weight:bold;
           border-radius:10px; cursor:pointer; margin:8px 5px; color:white; }
    .btn-capture { background:linear-gradient(135deg,#11998e,#38ef7d); color:#000; }
    .btn-close   { background:linear-gradient(135deg,#eb3349,#f45c43); }
    #status { margin-top:12px; font-size:13px; color:#aaa; min-height:20px; }
  </style>
</head>
<body>
  <h3>📸 เล็งหน้าให้ตรงแล้วกดถ่ายภาพ</h3>
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <div style="margin-top:18px;">
    <button class="btn btn-capture" onclick="capture()">📸 ถ่ายภาพ</button>
    <button class="btn btn-close"   onclick="closeMe()">❌ ยกเลิก</button>
  </div>
  <p id="status">กำลังเปิดกล้อง...</p>
  <script>
    const params  = new URLSearchParams(window.location.search);
    const context = params.get('ctx') || 'default';
    const video   = document.getElementById('video');
    const canvas  = document.getElementById('canvas');
    const status  = document.getElementById('status');
    let stream    = null;

    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false })
      .then(s => { stream = s; video.srcObject = s; status.innerText = '✅ กล้องพร้อมแล้ว'; })
      .catch(err => {
        const msg = {
          'NotAllowedError':  'กรุณาอนุญาตสิทธิ์กล้องในบราวเซอร์',
          'NotFoundError':    'ไม่พบกล้องในอุปกรณ์นี้',
          'NotReadableError': 'กล้องถูกใช้งานโดยแอปอื่นอยู่'
        }[err.name] || ('ข้อผิดพลาด: ' + err.message);
        status.innerText = '❌ ' + msg;
      });

    function capture() {
      if (!stream || video.videoWidth === 0) { status.innerText = '⚠️ กล้องยังไม่พร้อม'; return; }
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx2d = canvas.getContext('2d');
      ctx2d.translate(canvas.width, 0);
      ctx2d.scale(-1, 1);
      ctx2d.drawImage(video, 0, 0, canvas.width, canvas.height);
      const b64 = canvas.toDataURL('image/jpeg', 0.85);
      if (window.opener && !window.opener.closed) {
        window.opener.postMessage({ type: 'CAMERA_CAPTURE', context: context, base64: b64 }, '*');
      }
      stopStream();
      window.close();
    }

    function closeMe() { stopStream(); window.close(); }
    function stopStream() {
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    }
  </script>
</body>
</html>
